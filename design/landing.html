<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One click. Agent hosted.</title>
<style>
/* theme: dark */
:root {
  --bg: #0a0a0b;
  --fg: #f5f5f4;
  --muted: rgba(245, 245, 244, 0.46);
  --rule: rgba(245, 245, 244, 0.08);
  --tint: rgba(245, 245, 244, 0.04);
  --accent: #c6ff3d;
  --radius: 2px;
  --max: 44rem;
}
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
}
body {
  font-family: "JetBrains Mono", "IBM Plex Mono", "SF Mono", "Fira Code", ui-monospace, monospace;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background:
    radial-gradient(900px 520px at 50% -8%, var(--tint), transparent 60%),
    var(--bg);
  padding: clamp(1.25rem, 4vw, 3rem);
  -webkit-font-smoothing: antialiased;
}
main {
  width: 100%;
  max-width: var(--max);
  text-align: left;
}
h1 {
  font-size: clamp(2.5rem, 7vw, 5.5rem);
  line-height: 0.95;
  letter-spacing: -0.035em;
  margin: 0 0 1.5rem;
  font-weight: 800;
}
h1 span {
  display: block;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: -0.02em;
}
p {
  font-size: clamp(1rem, 1.5vw, 1.15rem);
  line-height: 1.55;
  color: var(--muted);
  margin: 0 0 3rem;
  max-width: 28rem;
}
hr {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: 2.5rem 0;
  max-width: 6rem;
  margin-left: 0;
}
a.cta {
  display: inline-block;
  padding: 1.05rem 1.6rem;
  background: var(--accent);
  color: var(--bg);
  text-decoration: none;
  font-weight: 700;
  letter-spacing: 0.01em;
  font-size: 1rem;
  border-radius: var(--radius);
}
a.cta:hover,
a.cta:focus,
a.cta:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 4px;
}
@media (max-width: 640px) {
  h1 { letter-spacing: -0.025em; }
  p  { margin-bottom: 2.25rem; }
}
</style>
</head>
<body>
<main>
<h1>One click.<span>Agent hosted.</span></h1>
<hr>
<p>Paste your agent. We run it. You keep writing code.</p>
<a class="cta" href="#post">Post agent</a>
</main>
</body>
</html>
